<!DOCTYPE html>
<html lang="en" data-kt-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' blob: data:; media-src 'self' blob:; connect-src 'self' blob: data: https://fonts.googleapis.com; worker-src 'self' blob:;"
    />
    <title>Kutlass Video Editor</title>
    <script>
      (function() {
        var theme = localStorage.getItem('kt-theme');
        if (theme !== 'light' && theme !== 'dark') theme = 'dark';
        document.documentElement.setAttribute('data-kt-theme', theme);
        document.documentElement.style.background = theme === 'dark' ? '#1c1c1c' : '#f0f2f5';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
